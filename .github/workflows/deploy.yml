name: Deploy para GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Atualizar CACHE_VERSION no sw.js
        run: |
          VERSION=$(TZ="America/Sao_Paulo" date +'%d.%m.%Y-%H%M')
          sed -i "s/const CACHE_VERSION = '.*'/const CACHE_VERSION = '${VERSION}'/" sw.js

      - name: Commitar sw.js atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --cached --quiet || git commit -m "chore: atualiza cache version [skip ci]"
          git push

      - name: Preparar pasta de publicação (sem .github)
        run: |
          mkdir /tmp/site
          rsync -av --exclude='.github' --exclude='.git' ./ /tmp/site/

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload do artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
